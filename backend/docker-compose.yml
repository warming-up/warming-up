services:
  app:
    build:
      context: .
    container_name: warmingup-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-warmingup}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USERNAME: ${MYSQL_USER:-warmingup}
      DB_PASSWORD: ${MYSQL_PASSWORD:-warmingup}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      TZ: Asia/Seoul
    ports:
      - "${SERVER_PORT:-8080}:8080"

  mysql:
    image: mysql:8.4
    container_name: warmingup-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-warmingup}
      MYSQL_USER: ${MYSQL_USER:-warmingup}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-warmingup}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Seoul
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
